<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>HelpDesk Smart Priority</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

<header>
    <h1>¡CREAR TICKET!</h1>
    <p>HelpDesk Smart Priority</p>
</header>

<main class="contenedor">

    <section id="loginCard" class="card">
        <h2>Login</h2>

        <input type="text" id="usuario" placeholder="Usuario">
        <input type="password" id="password" placeholder="Contraseña">

        <button onclick="login()">Ingresar</button>

        <p id="mensajeLogin" class="mensaje"></p>
    </section>

    <section id="panelAdmin" class="oculto">

        <div class="card">
            <h2>Nuevo Ticket</h2>

            <form id="ticketForm">

                <input type="text" id="nombreSolicitante" placeholder="Nombre solicitante" required>
                <input type="email" id="correo" placeholder="Correo electrónico" required>

                <select id="categoria">
                    <option value="hardware">Hardware</option>
                    <option value="software">Software</option>
                    <option value="red">Red</option>
                    <option value="cuenta">Cuenta</option>
                    <option value="otro">Otro</option>
                </select>

                <textarea id="descripcion" placeholder="Descripción del problema" required></textarea>

                <select id="impacto">
                    <option value="bajo">Impacto Bajo</option>
                    <option value="medio">Impacto Medio</option>
                    <option value="alto">Impacto Alto</option>
                </select>

                <select id="urgencia">
                    <option value="baja">Urgencia Baja</option>
                    <option value="media">Urgencia Media</option>
                    <option value="alta">Urgencia Alta</option>
                </select>

                <input type="number" id="tiempoEstimado" placeholder="Tiempo estimado en horas" required>

                <button type="submit">Enviar Ticket</button>
            </form>

            <p id="mensajeTicket" class="mensaje"></p>
        </div>

        <div id="listadoTickets" class="card">
            <h2 id="tituloListado">Mis Tickets</h2>

            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Solicitante</th>
                        <th>Categoría</th>
                        <th>Impacto</th>
                        <th>Urgencia</th>
                        <th>Estado</th>
                        <th>Prioridad</th>
                        <th>Motivo cierre</th>
                        <th id="columnaAccion">Acción</th>
                    </tr>
                </thead>

                <tbody id="tablaTickets"></tbody>
            </table>
        </div>

    </section>

</main>

<script>
    const API = 'http://localhost:3000/api/tickets';

    let apiKey = '';
    let rolUsuario = '';
    let usuarioLogueado = '';

    async function login() {
        const usuario = document.getElementById('usuario').value;
        const password = document.getElementById('password').value;

        const respuesta = await fetch('http://localhost:3000/login', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ usuario, password })
        });

        const data = await respuesta.json();

        if (respuesta.ok) {
            apiKey = data.apiKey;
            rolUsuario = data.rol;
            usuarioLogueado = data.usuario;

            document.getElementById('loginCard').classList.add('oculto');
            document.getElementById('panelAdmin').classList.remove('oculto');

            if (rolUsuario === 'administrador') {
                document.getElementById('tituloListado').textContent = 'Listado de Tickets';
                document.getElementById('columnaAccion').style.display = 'table-cell';
            } else {
                document.getElementById('tituloListado').textContent = 'Mis Tickets';
                document.getElementById('columnaAccion').style.display = 'none';
            }

            cargarTickets();

        } else {
            document.getElementById('mensajeLogin').textContent = data.mensaje;
        }
    }

    async function cargarTickets() {
        const respuesta = await fetch(
            `${API}?rol=${rolUsuario}&usuario=${usuarioLogueado}`
        );

        const tickets = await respuesta.json();

        const tabla = document.getElementById('tablaTickets');
        tabla.innerHTML = '';

        tickets.forEach(ticket => {
            const motivo = ticket.motivoCierre ? ticket.motivoCierre : 'Sin motivo';

            tabla.innerHTML += `
                <tr>
                    <td>${ticket.id}</td>
                    <td>${ticket.nombreSolicitante}</td>
                    <td>${ticket.categoria}</td>
                    <td>${ticket.impacto}</td>
                    <td>${ticket.urgencia}</td>

                    <td>
                        ${
                            rolUsuario === 'administrador'
                            ? `
                                <select id="estado-${ticket.id}">
                                    <option value="pendiente" ${ticket.estado === 'pendiente' ? 'selected' : ''}>Pendiente</option>
                                    <option value="en proceso" ${ticket.estado === 'en proceso' ? 'selected' : ''}>En proceso</option>
                                    <option value="resuelto" ${ticket.estado === 'resuelto' ? 'selected' : ''}>Resuelto</option>
                                    <option value="cerrado" ${ticket.estado === 'cerrado' ? 'selected' : ''}>Cerrado</option>
                                </select>
                            `
                            : ticket.estado
                        }
                    </td>

                    <td>
                        <div class="
                            prioridad
                            ${ticket.prioridad === 'Crítica' ? 'prioridad-critica' : ''}
                            ${ticket.prioridad === 'Alta' ? 'prioridad-alta' : ''}
                            ${ticket.prioridad === 'Media' ? 'prioridad-media' : ''}
                            ${ticket.prioridad === 'Baja' ? 'prioridad-baja' : ''}
                        ">
                            ${ticket.prioridad}
                        </div>
                    </td>

                    <td>${motivo}</td>

                    ${
                        rolUsuario === 'administrador'
                        ? `
                            <td>
                                <button class="btn-actualizar" onclick="actualizarEstado(${ticket.id})">
                                    Actualizar
                                </button>

                                <button class="btn-eliminar" onclick="cerrarTicket(${ticket.id})">
                                    Cerrar
                                </button>
                            </td>
                        `
                        : ''
                    }
                </tr>
            `;
        });
    }

    document.getElementById('ticketForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const ticket = {
            usuarioCreador: usuarioLogueado,
            nombreSolicitante: document.getElementById('nombreSolicitante').value,
            correo: document.getElementById('correo').value,
            categoria: document.getElementById('categoria').value,
            descripcion: document.getElementById('descripcion').value,
            impacto: document.getElementById('impacto').value,
            urgencia: document.getElementById('urgencia').value,
            tiempoEstimado: document.getElementById('tiempoEstimado').value,
            estado: 'pendiente'
        };

        const respuesta = await fetch(API, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'x-api-key': apiKey
            },
            body: JSON.stringify(ticket)
        });

        const data = await respuesta.json();

        document.getElementById('mensajeTicket').textContent = data.mensaje;
        document.getElementById('ticketForm').reset();

        cargarTickets();
    });

    async function actualizarEstado(id) {
        const nuevoEstado = document.getElementById(`estado-${id}`).value;

        const respuesta = await fetch(`${API}/${id}/estado`, {
            method: 'PATCH',
            headers: {
                'Content-Type': 'application/json',
                'x-api-key': apiKey
            },
            body: JSON.stringify({
                estado: nuevoEstado
            })
        });

        const data = await respuesta.json();

        alert(data.mensaje);
        cargarTickets();
    }

    async function cerrarTicket(id) {
        const motivoCierre = prompt(
            'Ingrese el motivo por el cual se cierra o elimina este ticket:'
        );

        if (!motivoCierre) {
            alert('Debe ingresar un motivo para cerrar el ticket.');
            return;
        }

        const respuesta = await fetch(`${API}/${id}`, {
            method: 'DELETE',
            headers: {
                'Content-Type': 'application/json',
                'x-api-key': apiKey
            },
            body: JSON.stringify({
                motivoCierre
            })
        });

        const data = await respuesta.json();

        alert(data.mensaje);
        cargarTickets();
    }
</script>

</body>

</html>
